<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="maindiv">
        <img src="./assets/pikachu.png" alt="Pikachu" class="pikachuimg">
        <div class="yellowdiv">
            <img class="logo" src="./assets/pokemon logo.png" alt="Pokemon logo">
            <img class="pikachuball" src="./assets/pokeball-img.png" alt="Poké Ball background">
            <main class="text-area">
                <p class="first-line"><strong>POKEMON GEN I</strong></p>
                <h1>Pikachu</h1>
                <p class="paragraph">
                    Pikachu is an Electric-type Pokemon introduced<br>
                    in Generation I. Pikachu are small, chubby,<br>
                    and incredibly cute mouse-like Pokemon.<br>
                    They are almost completely covered by<br>
                    yellow fur.
                </p>
                <div class="last-line">01 / 08</div>
            </main>
        </div>
        <div class="creamdiv">


            <div class="dots">
               <div class="blackcircle"></div>
               <div class="yellowcircle"></div>
               <div class="yellowcircle"></div>
               <div class="yellowcircle"></div>
               <div class="yellowcircle"></div>
            </div>

            <img class="hamburger" src="./assets/Hamburger Menu 1.png" alt="Hamburger">
        </div>
    </div>
</body>
</html>
